# GLOBAL TECHINICAL CONFIG RATE LIMITING ZONES
# limit_req_zone $binary_remote_addr zone=global_frontend_zone:10m rate=100r/s;  # 100 requests/sec for frontend
limit_req_zone $binary_remote_addr zone=global_crm_zone:10m rate=100r/s;      # 10 requests/sec for CRM
limit_req_zone $binary_remote_addr zone=global_api_zone:10m rate=15r/s;      # 15 requests/sec for API
limit_req_zone $binary_remote_addr zone=global_upload_zone:10m rate=100r/s;    # 2 requests/sec for upload
limit_req_zone $binary_remote_addr zone=global_essl_zone:10m rate=100r/s;    # 2 requests/sec for upload
limit_req_zone $binary_remote_addr zone=global_punch_zone:10m rate=100r/s;    # 2 requests/sec for upload
limit_req_zone $binary_remote_addr zone=wordpress_login:10m rate=1r/s;

server {
    listen 80;
    server_name globaltechnicalinstitute.com www.globaltechnicalinstitute.com crm.globaltechnicalinstitute.com api.globaltechnicalinstitute.com upload.globaltechnicalinstitute.com essl.globaltechnicalinstitute.com blog.globaltechnicalinstitute.com punch.globaltechnicalinstitute.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name blog.globaltechnicalinstitute.com;

    ssl_certificate /etc/letsencrypt/live/globaltechnicalinstitute.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/globaltechnicalinstitute.com/privkey.pem;

    root /var/www/globalwordpress;
    index index.php;

    # Allow large uploads
    client_max_body_size 300M;

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    location /wp-login.php {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;  # adjust if needed
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\.ht {
        deny all;
    }
}

server {
    listen 443 ssl;
    server_name www.globaltechnicalinstitute.com;

    ssl_certificate /etc/letsencrypt/live/globaltechnicalinstitute.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/globaltechnicalinstitute.com/privkey.pem;

    return 301 https://globaltechnicalinstitute.com$request_uri;
}


server {
    listen 443 ssl;
    server_name globaltechnicalinstitute.com;

    ssl_certificate /etc/letsencrypt/live/globaltechnicalinstitute.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/globaltechnicalinstitute.com/privkey.pem;

    location /crm/ {
        alias /var/www/Global/Admin/free-react-tailwind-admin-dashboard-main/dist/;
        try_files $uri $uri/ /index.html;
    }

    location / {
        # limit_req zone=global_frontend_zone burst=10 nodelay;  # Apply rate limit here
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable buffering for streaming support
        proxy_buffering off;
        proxy_set_header X-Accel-Buffering no;
    }
}

server {
    listen 443 ssl;
    server_name crm.globaltechnicalinstitute.com;

    # root /var/www/Global/Admin/free-react-tailwind-admin-dashboard-main/dist;
    # index index.html;

    ssl_certificate /etc/letsencrypt/live/globaltechnicalinstitute.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/globaltechnicalinstitute.com/privkey.pem;

    # location / {
    #     try_files $uri /index.html;
    # }

    return 301 https://globaltechnicalinstitute.com/crm$request_uri;
}

server {
    listen 443 ssl;
    server_name api.globaltechnicalinstitute.com;

    ssl_certificate /etc/letsencrypt/live/globaltechnicalinstitute.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/globaltechnicalinstitute.com/privkey.pem;

    location / {
        limit_req zone=global_api_zone burst=20 nodelay;  # Apply rate limit here
        proxy_pass http://127.0.0.1:4001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        client_max_body_size 100M;

        # Disable buffering for streaming support
        proxy_buffering off;
        proxy_set_header X-Accel-Buffering no;
    }
}

server {
    listen 443 ssl;
    server_name upload.globaltechnicalinstitute.com;

    client_max_body_size 200M;

    ssl_certificate /etc/letsencrypt/live/globaltechnicalinstitute.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/globaltechnicalinstitute.com/privkey.pem;

    location / {
        limit_req zone=global_upload_zone burst=5 nodelay;  # Apply rate limit here
        proxy_pass http://127.0.0.1:5001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl;
    server_name essl.globaltechnicalinstitute.com;

    client_max_body_size 200M;

    ssl_certificate /etc/letsencrypt/live/globaltechnicalinstitute.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/globaltechnicalinstitute.com/privkey.pem;

    location / {
        limit_req zone=global_essl_zone burst=5 nodelay;  # Apply rate limit here
        proxy_pass http://127.0.0.1:6001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /device {
        proxy_pass http://127.0.0.1:6001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}

